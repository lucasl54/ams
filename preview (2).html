<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoDrone</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:
  radial-gradient(circle at top,#00d9ff33,transparent 40%),
  linear-gradient(135deg,#02131f,#061f35,#0b2d4d);

  color:white;
  overflow:hidden;
}

/* HOME */

#homePage{
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  text-align:center;

  padding:60px;

  border-radius:30px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.15);

  box-shadow:
  0 0 40px rgba(0,217,255,0.25);
}

.logo{
  font-size:82px;
  font-weight:900;

  background:
  linear-gradient(90deg,#6ec6ff,#00d9ff,#9be7ff);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:15px;
  color:#d7f7ff;
}

.btn{
  margin-top:35px;

  padding:18px 45px;

  border:none;
  border-radius:15px;

  background:
  linear-gradient(90deg,#00d9ff,#6ec6ff);

  color:white;

  font-size:20px;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* REQUEST PAGE */

#requestPage{
  display:none;

  width:100%;
  height:100vh;

  padding:20px;
}

.title{
  text-align:center;

  font-size:45px;

  margin-bottom:20px;

  background:
  linear-gradient(90deg,#6ec6ff,#00d9ff);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.layout{
  display:grid;

  grid-template-columns:340px 1fr;

  gap:25px;

  height:82vh;

  align-items:center;
}

/* CARD */

.card{
  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  border-radius:28px;

  padding:25px;

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:
  0 0 30px rgba(0,217,255,0.08);
}

/* INPUT */

.input{
  width:100%;

  padding:16px;

  border:none;
  border-radius:12px;

  background:rgba(255,255,255,0.12);

  color:white;

  font-size:16px;

  margin-top:15px;
}

/* BUTTONS */

.startBtn{
  width:100%;

  margin-top:20px;

  padding:15px;

  border:none;
  border-radius:14px;

  background:
  linear-gradient(90deg,#00d9ff,#6ec6ff);

  color:white;

  font-size:18px;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.startBtn:hover{
  transform:scale(1.03);
}

/* STATUS */

.status{
  margin-top:25px;

  color:#c7f6ff;

  line-height:30px;
}

/* MAP CARD */

.mapCard{
  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;
}

/* MAPA */

#map{
  width:100%;
  height:100%;

  min-height:650px;

  border-radius:22px;

  overflow:hidden;

  border:3px solid rgba(0,217,255,0.25);

  box-shadow:
  0 0 25px rgba(0,217,255,0.15);
}

.leaflet-container{
  width:100%;
  height:100%;

  border-radius:22px;
}

/* DRONE */

.droneIcon{
  font-size:30px;
}

</style>
</head>

<body>

<!-- HOME -->

<section id="homePage">

  <div class="container">

    <h1 class="logo">EcoDrone</h1>

    <p class="subtitle">
      Coleta inteligente de lixo eletrônico
    </p>

    <button class="btn" onclick="openPage()">
      Solicitar Drone
    </button>

  </div>

</section>

<!-- REQUEST PAGE -->

<section id="requestPage">

  <h1 class="title">
    Solicitar Drone
  </h1>

  <div class="layout">

    <!-- MENU -->

    <div class="card">

      <h2>Digite seu endereço</h2>

      <input
      type="text"
      id="addressInput"
      class="input"
      placeholder="Rua, bairro ou cidade..."
      >

      <button
      class="startBtn"
      onclick="searchAddress()">

      Buscar Local

      </button>

      <button
      class="startBtn"
      onclick="startDrone()">

      Iniciar Drone

      </button>

      <div class="status">
        🚁 Drone aguardando missão<br>
        📍 Rastreamento em tempo real<br>
        ♻️ Coleta ecológica inteligente
      </div>

    </div>

    <!-- MAPA -->

    <div class="card mapCard">

      <div id="map"></div>

    </div>

  </div>

</section>

<script>

/* TROCAR TELA */

function openPage(){

  document.getElementById("homePage").style.display = "none";

  document.getElementById("requestPage").style.display = "block";

  setTimeout(() => {
    map.invalidateSize();
  }, 200);

}

/* MAPA */

let map =
L.map('map').setView(
[-23.55052,-46.633308],
12
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
  attribution:'OpenStreetMap'
}).addTo(map);

/* PIN */

let pin =
L.marker(
[-23.55052,-46.633308]
).addTo(map);

/* DRONE */

let droneIcon =
L.divIcon({
  html:'🚁',
  className:'droneIcon',
  iconSize:[30,30]
});

let drone =
L.marker(
[-23.56052,-46.643308],
{icon:droneIcon}
).addTo(map);

let targetLat = -23.55052;
let targetLng = -46.633308;

/* BUSCAR ENDEREÇO */

async function searchAddress(){

  let address =
  document.getElementById("addressInput").value;

  if(!address) return;

  let response =
  await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${address}`
  );

  let data =
  await response.json();

  if(data.length > 0){

    targetLat =
    parseFloat(data[0].lat);

    targetLng =
    parseFloat(data[0].lon);

    map.setView(
    [targetLat,targetLng],
    16
    );

    pin.setLatLng(
    [targetLat,targetLng]
    );

  }

}

/* DRONE */

function startDrone(){

  let startLat =
  targetLat + 0.01;

  let startLng =
  targetLng - 0.01;

  drone.setLatLng([
    startLat,
    startLng
  ]);

  let steps = 100;

  let current = 0;

  let interval =
  setInterval(()=>{

    current++;

    let lat =
    startLat +
    ((targetLat-startLat)/steps)*current;

    let lng =
    startLng +
    ((targetLng-startLng)/steps)*current;

    drone.setLatLng([lat,lng]);

    if(current >= steps){

      clearInterval(interval);

    }

  },50);

}

</script>

</body>
</html>
